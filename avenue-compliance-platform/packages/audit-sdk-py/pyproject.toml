[project]
name = "avenue-audit-sdk"
version = "0.1.0"
description = "Hash-chained immutable audit log SDK (Python). P1 of Avenue Compliance Platform."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["avenue_audit"]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
addopts = "-q"
