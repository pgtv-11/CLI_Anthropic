# Avenue Compliance Platform — Controls Matrix
#
# This file is the single source of truth mapping each FINRA / SEC rule in
# scope to (a) a named control, (b) the service/file that implements it, and
# (c) the test that proves it. Examiners ask for this artifact first.
#
# Status legend: planned | partial | implemented | tested | audited
# Every PR that touches a rule's implementation MUST update the matching row.

version: "2026.04.2"
last_reviewed: "2026-04-25"
round_2_changes:
  - "audit-sdk: cross-language hash-chain compatibility test (TS ↔ Py)"
  - "audit-sdk: outcome + outcomeHash field added (P1 lineage)"
  - "OPA SoD: distinct-approver enforcement for SAR filing"
  - "Reg BI: cost materiality threshold versioned by ruleVersionId"
  - "Surveillance: kyc data_version_id propagated into Alert"
  - "Evidence packager: deterministic PDF render (fixed creation date)"
  - "Identity service: explicit RBAC evaluation in CompositePolicyEngine"
  - "Citation guard: bullet-list assertions now checked"
round_3_changes:
  - "audit-sdk: schemaVersion field with v1↔v2 dispatch in verifyChain (back-compat)"
  - "audit-sdk: v1 backward-compatibility test fixture (TS + Py)"
  - "evidence-packager: filename whitelist + reserved-name guard against S3 key injection"
  - "evidence-packager: ReportLab tightly version-pinned (4.2.x) for determinism"
  - "API gateway: two-phase audit (intent UNKNOWN → outcome SUCCESS/HANDLER_ERROR), audit-sink failure surfaces 5xx"
  - "Reg BI: typed UnknownRuleVersionError so handler can map to POLICY_DENY"
  - "Reg BI: handleRegBI wrapper converts unknown ruleVersionId into structured deny instead of HANDLER_ERROR"
  - "identity-policy-service: HMAC-SHA256 watermark for examiner sessions; verifyExaminerSession with timing-safe compare"
ccp_owner: "chief_compliance_officer"

